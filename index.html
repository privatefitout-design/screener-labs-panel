<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ScreenerLabs</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#1a1a1a;color:#fff;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* Top nav */
.topnav{background:#111;border-bottom:1px solid #2a2a2a;padding:0;display:flex;align-items:stretch;flex-shrink:0}
.nav-logo{padding:14px 16px;display:flex;align-items:center;gap:8px;border-right:1px solid #2a2a2a}
.wordmark{font-size:15px;font-weight:700;color:#fff}
.nav-tabs{display:flex;flex:1;overflow-x:auto;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{padding:14px 16px;font-size:13px;font-weight:500;color:#666;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all 0.15s;flex-shrink:0}
.nav-tab.active{color:#fff;border-bottom-color:#e8845a}
.nav-tab:hover{color:#ccc}

/* Status bar */
.statusbar{background:#0f0f0f;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #2a2a2a;flex-shrink:0}
.status-left{display:flex;align-items:center;gap:8px}
.dot{width:7px;height:7px;border-radius:50%;background:#22c55e;flex-shrink:0}
.status-text{font-size:12px;color:#666}
.status-badge{font-size:11px;color:#e8845a;background:#2a1a10;padding:3px 10px;border-radius:12px;border:1px solid #5a3020;font-weight:600}

/* Cards */
.cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 16px;flex-shrink:0}
.card{background:#222;border:1px solid #2a2a2a;border-radius:10px;padding:12px 14px}
.card-label{font-size:10px;color:#555;margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em}
.card-value{font-size:20px;font-weight:700;color:#fff}
.card-sub{font-size:11px;color:#444;margin-top:3px}

/* Chat */
.chat-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;margin:0 16px 0}
.chat-header{padding:10px 0;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.chat-title{font-size:13px;font-weight:600;color:#888}
.chat-status{font-size:12px;color:#22c55e;font-weight:500}
.chat-msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:12px;padding-bottom:8px}
.msg{display:flex;gap:10px;align-items:flex-start}
.msg-av{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.msg-user .msg-av{background:#e8845a;color:#fff}
.msg-agent .msg-av{background:#2a2a2a;color:#aaa}
.msg-bubble{font-size:14px;line-height:1.6;padding:10px 14px;border-radius:10px;max-width:calc(100% - 42px)}
.msg-user .msg-bubble{background:#2a1a10;color:#eee}
.msg-agent .msg-bubble{background:#222;color:#bbb}

/* Input */
.input-area{padding:12px 0 16px;display:flex;gap:8px;flex-shrink:0}
.chat-input{flex:1;background:#222;border:1px solid #333;border-radius:12px;padding:13px 16px;font-size:15px;color:#fff;outline:none;font-family:‘Inter’,sans-serif}
.chat-input::placeholder{color:#444}
.chat-input:focus{border-color:#555}
.btn-send{background:#e8845a;border:none;border-radius:12px;padding:13px 20px;font-size:14px;font-weight:700;color:#fff;cursor:pointer;white-space:nowrap;font-family:‘Inter’,sans-serif;flex-shrink:0}
.btn-send:disabled{opacity:0.4}
.btn-file{background:#2a2a2a;border:1px solid #444;border-radius:12px;padding:13px 16px;font-size:18px;cursor:pointer;flex-shrink:0}

/* Typing */
.typing{display:flex;gap:5px;align-items:center;padding:10px 14px}
.typing span{width:7px;height:7px;border-radius:50%;background:#555;animation:blink 1.2s infinite}
.typing span:nth-child(2){animation-delay:0.2s}
.typing span:nth-child(3){animation-delay:0.4s}
@keyframes blink{0%,80%,100%{opacity:0.2}40%{opacity:1}}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
</style>

</head>
<body>

<div class="topnav">
  <div class="nav-logo">
    <svg width="20" height="16" viewBox="0 0 22 18" fill="none">
      <rect x="2" y="4" width="10" height="10" rx="1" transform="rotate(45 7 9)" fill="#e8845a" opacity="0.4"/>
      <rect x="8" y="4" width="10" height="10" rx="1" transform="rotate(45 13 9)" fill="#e8845a"/>
    </svg>
    <span class="wordmark">ScreenerLabs</span>
  </div>
  <div class="nav-tabs">
    <div class="nav-tab active" onclick="setTab(this,'privatefitout-design/crypto-scanner')">Scanner 1</div>
    <div class="nav-tab" onclick="setTab(this,'privatefitout-design/crypto-scanner')">Scanner 2</div>
    <div class="nav-tab" onclick="setTab(this,'privatefitout-design/crypto-scanner')">GitHub</div>
    <div class="nav-tab" onclick="setTab(this,'')">Railway</div>
    <div class="nav-tab" onclick="setTab(this,'')">Telegram</div>
  </div>
</div>

<div class="statusbar">
  <div class="status-left">
    <span class="dot"></span>
    <span class="status-text">Railway · EU · Online</span>
  </div>
  <span class="status-badge" id="agent-status">● ГОТОВ</span>
</div>

<div class="cards">
  <div class="card">
    <div class="card-label">Последний скан</div>
    <div class="card-value" id="last-scan">--:--</div>
    <div class="card-sub">каждые 30 мин</div>
  </div>
  <div class="card">
    <div class="card-label">Статус агента</div>
    <div class="card-value" style="font-size:14px;padding-top:4px;display:flex;align-items:center;gap:6px"><span class="dot"></span>Ready</div>
    <div class="card-sub">ожидает команды</div>
  </div>
</div>

<div class="chat-wrap">
  <div class="chat-header">
    <span class="chat-title">Агент</span>
    <span class="chat-status" id="chat-status">● готов</span>
  </div>
  <div class="chat-msgs" id="messages">
    <div class="msg msg-agent">
      <div class="msg-av">SL</div>
      <div class="msg-bubble">Привет, Said. Готов. Нажми 📎 чтобы залить файл в GitHub, или пиши команду.</div>
    </div>
  </div>
  <div class="input-area">
    <input type="file" id="file-upload" style="display:none" onchange="uploadFile(this)"/>
    <button class="btn-file" onclick="document.getElementById('file-upload').click()" title="Загрузить файл в GitHub">📎</button>
    <input class="chat-input" id="user-input" placeholder="Команда агенту..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"/>
    <button class="btn-send" id="send-btn" onclick="sendMessage()">→</button>
  </div>
</div>

<script>
let conversationHistory=[];
let currentRepo='privatefitout-design/crypto-scanner';

function setTab(el,repo){
  document.querySelectorAll('.nav-tab').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
  if(repo)currentRepo=repo;
}

function addMessage(role,text){
  const msgs=document.getElementById('messages');
  const div=document.createElement('div');
  div.className=`msg msg-${role==='user'?'user':'agent'}`;
  div.innerHTML=`<div class="msg-av">${role==='user'?'SA':'SL'}</div><div class="msg-bubble">${text.replace(/\n/g,'<br>')}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
}

function showTyping(){
  const msgs=document.getElementById('messages');
  const div=document.createElement('div');
  div.className='msg msg-agent';
  div.id='typing-indicator';
  div.innerHTML=`<div class="msg-av">SL</div><div class="typing"><span></span><span></span><span></span></div>`;
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
}

function removeTyping(){
  const t=document.getElementById('typing-indicator');
  if(t)t.remove();
}

function setStatus(text,color){
  document.getElementById('agent-status').textContent='● '+text.toUpperCase();
  document.getElementById('chat-status').textContent='● '+text;
  document.getElementById('chat-status').style.color=color||'#22c55e';
}

function uploadFile(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    const content=e.target.result;
    const msg='залей файл '+file.name+' в репо privatefitout-design/crypto-scanner с таким содержимым:\n'+content;
    conversationHistory.push({role:'user',content:msg});
    addMessage('user','📎 '+file.name+' → crypto-scanner');
    setStatus('думает','#e8845a');
    showTyping();
    document.getElementById('send-btn').disabled=true;
    fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:conversationHistory})})
    .then(r=>r.json()).then(data=>{
      removeTyping();
      addMessage('agent',data.response||data.error||'ошибка');
      if(data.response)conversationHistory.push({role:'assistant',content:data.response});
      document.getElementById('last-scan').textContent=new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
    }).catch(e=>{removeTyping();addMessage('agent','❌ '+e.message);})
    .finally(()=>{document.getElementById('send-btn').disabled=false;setStatus('готов','#22c55e');});
  };
  reader.readAsText(file);
  input.value='';
}

async function sendMessage(){
  const input=document.getElementById('user-input');
  const text=input.value.trim();
  if(!text)return;
  input.value='';
  document.getElementById('send-btn').disabled=true;
  setStatus('думает','#e8845a');
  addMessage('user',text);
  conversationHistory.push({role:'user',content:text});
  showTyping();
  try{
    const resp=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:conversationHistory,repo:currentRepo})});
    const data=await resp.json();
    removeTyping();
    addMessage('agent',data.error?'❌ '+data.error:data.response);
    if(data.response)conversationHistory.push({role:'assistant',content:data.response});
    document.getElementById('last-scan').textContent=new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
  }catch(e){removeTyping();addMessage('agent','❌ '+e.message);}
  document.getElementById('send-btn').disabled=false;
  setStatus('готов','#22c55e');
}
</script>

</body>
</html>
